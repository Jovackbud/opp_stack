<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OppTrack | Live Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{background:#0a1628;color:#f5f0e8;font-family:'DM Sans',sans-serif;padding:40px 20px;text-align:center;}
  h2{font-family:'Playfair Display',serif;font-size:32px;color:#c9a84c;margin-bottom:5px}
  p{color:rgba(245,240,232,0.6);margin-bottom:40px;font-size:14px}
  .grid{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
  .stat-box{background:#112240;padding:30px;border-radius:16px;border:1px solid rgba(201,168,76,.2);width:100%;max-width:260px}
  .stat-num{font-family:'Playfair Display',serif;font-size:48px;color:#c9a84c;line-height:1;margin-bottom:10px}
  .stat-label{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,0.8)}
</style>
</head>
<body>
<h2>Platform Analytics</h2>
<p>Tracking the impact of zero-bloat opportunity discovery.</p>

<div class="grid">
  <div class="stat-box">
    <div class="stat-num" id="s-opps">...</div>
    <div class="stat-label">Verified Opportunities</div>
  </div>
  <div class="stat-box" style="border-top:3px solid #4caf7d">
    <div class="stat-num" id="s-users">...</div>
    <div class="stat-label">Active Talents</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getCountFromServer, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // Requires config initialization
  const firebaseConfig = { /* Populate to match index.html */ };
  
  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadStats() {
      // Fire simultaneous count aggregation
      const [opps, users] = await Promise.all([
        getCountFromServer(query(collection(db, 'opportunities'), where('is_approved', '==', true))),
        getCountFromServer(collection(db, 'users'))
      ]);
      
      document.getElementById('s-opps').innerText = opps.data().count;
      document.getElementById('s-users').innerText = users.data().count;
    }
    loadStats();
  } catch(e) {
    document.getElementById('s-opps').innerText = 'Err';
    document.getElementById('s-users').innerText = 'Err';
  }
</script>
</body>
</html>
